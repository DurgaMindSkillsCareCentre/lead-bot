<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BALEE GARDEN - OMNI SEMANTIC SNIPER v10.0</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; background: #050505; color: #f0ebe0; -webkit-font-smoothing: antialiased; }
        .gold { color: #C8A84B; }
        .sniper-panel { background: #1a1408; padding: 15px; border-bottom: 2px solid #C8A84B; position: sticky; top: 0; z-index: 120; box-shadow: 0 4px 20px rgba(0,0,0,0.8); }
        .control-row { display: flex; flex-direction: column; gap: 8px; }
        .label { font-size: 9px; font-weight: 900; color: #C8A84B; text-transform: uppercase; letter-spacing: 1px; }
        select { background: #000; color: #C8A84B; border: 1px solid #C8A84B; padding: 12px; border-radius: 6px; font-size: 12px; font-weight: 700; width: 100%; outline: none; appearance: none; }
        
        .omni-btn { 
            background: linear-gradient(135deg, #C8A84B, #8A6D29, #C8A84B, #B8860B); 
            background-size: 300% auto;
            color: #000; border: none; padding: 18px; font-weight: 900; border-radius: 8px; 
            text-transform: uppercase; font-size: 11px; width: 100%; cursor: pointer; 
            margin-bottom: 12px; box-shadow: 0 0 25px rgba(200,168,75,0.5);
            animation: flow 4s ease infinite;
        }
        @keyframes flow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .sniper-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 12px; }
        .mini-btn { background: #1a1408; color: #C8A84B; border: 1px solid #C8A84B; padding: 10px; font-size: 9px; font-weight: 800; text-transform: uppercase; border-radius: 4px; cursor: pointer; transition: 0.3s; }
        .mini-btn:active { background: #C8A84B; color: #000; }

        .nav-scroll { display: flex; background: #050505; position: sticky; top: 295px; z-index: 100; border-bottom: 1px solid #333; overflow-x: auto; scrollbar-width: none; }
        .nav-tab { flex: 1; padding: 15px 5px; border: none; background: transparent; color: #666; font-size: 9px; font-weight: 800; text-transform: uppercase; white-space: nowrap; text-align: center; cursor: pointer; }
        .nav-tab.active { color: #C8A84B; border-bottom: 3px solid #C8A84B; background: #111; }
        
        .btn-grid { display: grid; grid-template-columns: 1fr; gap: 6px; padding: 15px; }
        .btn-v22 { background: #111; color: #C8A84B; border: 1px solid #C8A84B44; padding: 14px; font-size: 10.5px; border-radius: 5px; text-align: left; font-weight: 600; text-transform: uppercase; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .btn-v22.active { border: 2px solid #C8A84B; background: #1a1408; }
        .btn-v24 { background: #1a1a1a; color: #C8A84B; border: 1px solid #C8A84B; padding: 16px; font-weight: 900; border-radius: 6px; text-transform: uppercase; font-size: 10px; text-align: left; cursor: pointer; }
        
        textarea { width: calc(100% - 30px); margin: 15px; background: #080808; color: #fff; border: 1px solid #333; padding: 15px; border-radius: 8px; box-sizing: border-box; font-family: monospace; font-size: 13px; min-height: 200px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [tab, setTab] = useState("sector");
            const [timeFrame, setTimeFrame] = useState("m");
            const [sniperMode, setSniperMode] = useState("1");
            const [activeSector, setActiveSector] = useState("Multi Specialty Hospital");

            // ── 30 INCORPORATED AI SEMANTIC SNIPER OPTIONS ────────────────
            const sniperOptions = [
                { id: "1", n: "1. Direct Buyer Intent", tag: '("looking for land" OR "want to buy" OR "buyer")' },
                { id: "2", n: "2. Urgent Requirements", tag: '("urgent buyer" OR "immediate requirement")' },
                { id: "3", n: "3. Corporate Expansion", tag: '("expansion plans" OR "new branch" OR "office space")' },
                { id: "4", n: "4. Institutional / Trust", tag: '("educational trust" OR "institutional land")' },
                { id: "5", n: "5. Hospitality Developers", tag: '("resort project" OR "hotel site" OR "stay")' },
                { id: "6", n: "6. Industrial / SIDCO", tag: '("factory site" OR "industrial unit" OR "manufacturing")' },
                { id: "7", n: "7. Healthcare Chains", tag: '("hospital land" OR "medical college" OR "clinic")' },
                { id: "8", n: "8. Retail & Showrooms", tag: '("prime commercial" OR "showroom site" OR "retail")' },
                { id: "9", n: "9. Logistics & Storage", tag: '("warehouse space" OR "godown requirement")' },
                { id: "10", n: "10. NRI Global Investors", tag: '("NRI investment" OR "Tamil expat" OR "foreign direct")' },
                { id: "11", n: "11. High-Net-Worth (HNI)", tag: '("wealth management" OR "premium investment")' },
                { id: "12", n: "12. Joint Venture (JV)", tag: '("joint venture" OR "JV development" OR "partner")' },
                { id: "13", n: "13. Agro-Tech / Organic", tag: '("farm land wanted" OR "organic farming" OR "polyhouse")' },
                { id: "14", n: "14. Senior Living Hubs", tag: '("retirement home" OR "senior community" OR "assisted living")' },
                { id: "15", n: "15. Education Academies", tag: '("CBSE school" OR "coaching center" OR "university")' },
                { id: "16", n: "16. Petrol Bunk / Fuel", tag: '("petrol pump site" OR "gas station" OR "fuel outlet")' },
                { id: "17", n: "17. Marriage / Convention", tag: '("marriage mahal" OR "convention center" OR "function hall")' },
                { id: "18", n: "18. IT & Software Park", tag: '("IT park" OR "tech hub" OR "data center")' },
                { id: "19", n: "19. Sports & Recreation", tag: '("sports turf" OR "badminton academy" OR "stadium")' },
                { id: "20", n: "20. Temple & Spiritual", tag: '("ashram site" OR "spiritual center" OR "temple trust")' },
                { id: "21", n: "21. Highway Frontage", tag: '("highway side frontage" OR "bypass land")' },
                { id: "22", n: "22. Re-Investment Leads", tag: '("property swap" OR "cashed out" OR "reinvesting")' },
                { id: "23", n: "23. Startup Incubators", tag: '("startup incubator" OR "coworking land" OR "lab")' },
                { id: "24", n: "24. Food Processing", tag: '("food park" OR "cold storage" OR "processing unit")' },
                { id: "25", n: "25. Luxury Townships", tag: '("villa project" OR "gated community" OR "layout promoter")' },
                { id: "26", n: "26. Shopping Complexes", tag: '("market site" OR "shopping mall" OR "arcade")' },
                { id: "27", n: "27. Textile / Garments", tag: '("textile unit" OR "garment factory" OR "spinning mill")' },
                { id: "28", n: "28. Water & Chemical", tag: '("RO plant" OR "industrial plant" OR "processing")' },
                { id: "29", n: "29. Real Estate Syndicates", tag: '("land pool" OR "investor group" OR "consortium")' },
                { id: "30", n: "30. Community Advice", tag: '("suggest land" OR "recommend" OR "best area to buy")' }
            ];

            const sectors = [
                "Software Company", "IT Hub / Park", "Automobile Showroom", "EV Charging Station", "Multi Specialty Hospital",
                "Nursing Home", "International School", "CBSE Academy", "Logistics Godown", "Warehouse Park",
                "Marriage Mahal", "Mini Function Hall", "Textile Showroom", "Garment Unit", "Luxury Resort",
                "Agro Farm House", "Cold Storage Unit", "Food Processing", "Gated Community", "Villa Township",
                "Petrol Bunk", "SIDCO Industrial Plot", "Engineering College", "Arts & Science College", "Sports Turf",
                "Badminton Academy", "Bank Zonal Office", "Central Kitchen", "Cloud Kitchen Hub", "Convention Center"
            ];

            const intelSources = [
                { n: "FB: Intent Search", s: "site:facebook.com" },
                { n: "LI: Corporate Leads", s: "site:linkedin.com" },
                { n: "Reddit: Discussions", s: "site:reddit.com" },
                { n: "Quora: Investment", s: "site:quora.com" },
                { n: "MagicBricks Buyer", s: "site:magicbricks.com" },
                { n: "99Acres Requirement", s: "site:99acres.com" },
                { n: "OLX Direct Buyers", s: "site:olx.in" },
                { n: "Twitter: Real-time", s: "site:twitter.com" },
                { n: "Insta: Visual Intent", s: "site:instagram.com" },
                { n: "IndiaMart B2B", s: "site:indiamart.com" },
                { n: "NoBroker Leads", s: "site:nobroker.in" },
                { n: "CommonFloor Wanted", s: "site:commonfloor.com" },
                { n: "Sulekha Business", s: "site:sulekha.com" },
                { n: "SSC: Infrastructure", s: "site:skyscrapercity.com" },
                { n: "Global Tamil NRI", s: "site:tamils.com" },
                { n: "YouTube Investment", s: "site:youtube.com" },
                { n: "Click.in Classifieds", s: "site:click.in" },
                { n: "Locanto Investors", s: "site:locanto.net" },
                { n: "PropTiger Leads", s: "site:proptiger.com" },
                { n: "SquareYards", s: "site:squareyards.com" },
                { n: "Housing.com Hot", s: "site:housing.com" },
                { n: "Angel Investor Net", s: "site:investmentnetwork.in" },
                { n: "Gumtree NRI Hub", s: "site:gumtree.com" },
                { n: "Makaan.com", s: "site:makaan.com" },
                { n: "JustDial Leads", s: "site:justdial.com" },
                { n: "SBNRI investment", s: "site:sbnri.com" },
                { n: "TradeIndia B2B", s: "site:tradeindia.com" },
                { n: "NRIway Madurai", s: "site:nriway.com" },
                { n: "PropertyWala", s: "site:propertywala.com" },
                { n: "Google Natural Web", s: "" }
            ];

            const loc = 'Madurai "Alagar Kovil"';
            const softExcl = '-resale -broker';

            const executeOmniSearch = (index) => {
                const tf = `&tbs=qdr:${timeFrame}`;
                const mode = sniperOptions.find(o => o.id === sniperMode);
                const intent = mode ? mode.tag : '("looking for land" OR "buyer")';
                
                const queries = [
                    `site:facebook.com ${loc} ${intent} ${softExcl}`,
                    `site:magicbricks.com ${loc} intext:"buyer" ${softExcl}`,
                    `site:olx.in ${loc} "wanted" ${softExcl}`,
                    `site:reddit.com ${loc} "investment" ${softExcl}`,
                    `"who is looking to buy land in Madurai Alagar Kovil" ${softExcl}`
                ];

                window.open(`https://www.google.com/search?q=${encodeURIComponent(queries[index])}${tf}`, '_blank');
            };

            const launchAll = () => {
                [0, 1, 2, 3, 4].forEach((i) => setTimeout(() => executeOmniSearch(i), i * 1500));
            };

            const executeSearch = (sector, platform = "") => {
                const mode = sniperOptions.find(o => o.id === sniperMode);
                const query = `${platform} ${loc} "${sector}" ${mode.tag} ${softExcl}`;
                window.open(`https://www.google.com/search?q=${encodeURIComponent(query)}&tbs=qdr:${timeFrame}`, '_blank');
            };

            return (
                <div>
                    <div className="sniper-panel">
                        <header style={{textAlign:'center', marginBottom:'12px'}}>
                            <div className="gold" style={{fontWeight:900, fontSize:'20px', letterSpacing:'1px'}}>BALEE GARDEN</div>
                            <div style={{fontSize:'10px', color:'#888', fontWeight:'800', textTransform:'uppercase'}}>AI SEMANTIC OMNI-SNIPER v10.0</div>
                        </header>
                        
                        <button className="omni-btn" onClick={launchAll}>🚀 LAUNCH FULL BUYER RADAR (SEMANTIC SCAN)</button>

                        <div className="sniper-grid">
                            <button className="mini-btn" onClick={() => executeOmniSearch(0)}>1. SOCIAL<br/><span style={{fontSize:'7px',opacity:0.7}}>FB+LI+X</span></button>
                            <button className="mini-btn" onClick={() => executeOmniSearch(1)}>2. RE PORTALS<br/><span style={{fontSize:'7px',opacity:0.7}}>99acres+MB</span></button>
                            <button className="mini-btn" onClick={() => executeOmniSearch(2)}>3. B2B & OLX<br/><span style={{fontSize:'7px',opacity:0.7}}>OLX+IndiaMart</span></button>
                            <button className="mini-btn" onClick={() => executeOmniSearch(3)}>4. GLOBAL/NRI<br/><span style={{fontSize:'7px',opacity:0.7}}>Reddit+Quora</span></button>
                            <button className="mini-btn" style={{gridColumn: 'span 2'}} onClick={() => executeOmniSearch(4)}>5. NATURAL LANGUAGE SCANNER</button>
                        </div>

                        <div className="control-row">
                            <span className="label">1. Lock Semantic Intent (30 Options)</span>
                            <select value={sniperMode} onChange={(e)=>setSniperMode(e.target.value)}>
                                {sniperOptions.map(o => <option key={o.id} value={o.id}>{o.n}</option>)}
                            </select>
                            <span className="label">2. Lead Freshness</span>
                            <select value={timeFrame} onChange={(e)=>setTimeFrame(e.target.value)}>
                                <option value="w">Last 1 Week</option>
                                <option value="m">Last 1 Month</option>
                                <option value="y">Last 1 Year</option>
                            </select>
                        </div>
                    </div>

                    <nav className="nav-scroll">
                        <button onClick={()=>setTab("sector")} className={`nav-tab ${tab==='sector'?'active':''}`}>30 Sectors</button>
                        <button onClick={()=>setTab("intel")} className={`nav-tab ${tab==='intel'?'active':''}`}>30 Platforms</button>
                        <button onClick={()=>setTab("extract")} className={`nav-tab ${tab==='extract'?'active':''}`}>Extract</button>
                    </nav>

                    <main>
                        {tab === 'sector' && (
                            <div className="btn-grid">
                                {sectors.map((s, i) => (
                                    <button key={i} className={`btn-v22 ${activeSector===s?'active':''}`} 
                                            onClick={()=>{setActiveSector(s); executeSearch(s);}}>
                                        <span>{i+1}. {s}</span>
                                        <span className="gold">🔍</span>
                                    </button>
                                ))}
                            </div>
                        )}

                        {tab === 'intel' && (
                            <div className="btn-grid">
                                {intelSources.map((is, i) => (
                                    <button key={i} className="btn-v24" onClick={()=>executeSearch(activeSector, is.s)}>
                                        {i+1}. {is.n}
                                    </button>
                                ))}
                            </div>
                        )}

                        {tab === 'extract' && (
                            <div>
                                <textarea placeholder="Paste search text here to extract contacts..."></textarea>
                                <div style={{padding:'0 15px'}}><button className="btn-v24" style={{width:'100%', textAlign:'center'}}>⚡ EXTRACT CONTACTS</button></div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
