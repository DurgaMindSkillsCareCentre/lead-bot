<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BALEE GARDEN - Madurai Project</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; font-family: 'Inter', -apple-system, sans-serif; background: #050505; color: #f0ebe0; }
        .gold { color: #C8A84B; }
        .card { background: #111; border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid #C8A84B33; }
        
        /* Time Filter Header */
        .filter-bar { background: #1a1408; padding: 12px; border-bottom: 1px solid #C8A84B; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 110; }
        .filter-label { font-size: 10px; font-weight: 800; color: #C8A84B; text-transform: uppercase; letter-spacing: 1px; }
        .time-select { background: #000; color: #C8A84B; border: 1px solid #C8A84B; border-radius: 4px; padding: 6px; font-size: 11px; font-weight: 700; outline: none; }

        /* Navigation */
        .nav-scroll { display: flex; background: #050505; position: sticky; top: 48px; z-index: 100; border-bottom: 1px solid #333; overflow-x: auto; scrollbar-width: none; }
        .nav-tab { flex: 0 0 auto; padding: 15px 20px; border: none; background: transparent; color: #666; font-size: 10px; font-weight: 800; text-transform: uppercase; white-space: nowrap; }
        .nav-tab.active { color: #C8A84B; border-bottom: 3px solid #C8A84B; background: #111; }

        /* Buttons */
        .btn-v22 { background: #111; color: #C8A84B; border: 1px solid #C8A84B44; padding: 12px; font-size: 9px; border-radius: 4px; width: 100%; margin-bottom: 6px; text-align: left; font-weight: 600; text-transform: uppercase; }
        .btn-v24 { background: linear-gradient(135deg, #C8A84B, #8A6D29); color: #000; border: none; padding: 14px; font-weight: 800; border-radius: 6px; width: 100%; margin-bottom: 10px; text-transform: uppercase; font-size: 9px; text-align: left; letter-spacing: 0.5px; }
        .btn-red { background: #d93025; color: #fff; border: none; padding: 16px; border-radius: 8px; width: 100%; font-weight: 900; margin-bottom: 15px; font-size: 12px; letter-spacing: 1px; }
        
        .section-title { font-size: 11px; font-weight: 800; margin: 15px 0 10px; color: #C8A84B; text-transform: uppercase; border-left: 3px solid #C8A84B; padding-left: 10px; }
        .asset-img { width: 100%; border-radius: 8px; margin-bottom: 15px; border: 1px solid #C8A84B33; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        textarea { width: 100%; background: #000; color: #fff; border: 1px solid #333; padding: 12px; border-radius: 8px; box-sizing: border-box; font-family: monospace; font-size: 12px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [tab, setTab] = useState("v22");
            const [timeFrame, setTimeFrame] = useState("d"); // d=24h, w=week, m=month

            const openSearch = (q) => {
                window.open(`https://www.google.com/search?q=${encodeURIComponent(q)}&tbs=qdr:${timeFrame}`, '_blank');
            };

            const sectors = [
                "Software Company", "IT Hub / Park", "Automobile Showroom", "EV Charging Station", "Multi Specialty Hospital",
                "Nursing Home", "International School", "CBSE Academy", "Logistics Godown", "Warehouse Park",
                "Marriage Mahal", "Mini Function Hall", "Textile Showroom", "Garment Unit", "Luxury Resort",
                "Agro Farm House", "Cold Storage Unit", "Food Processing", "Gated Community", "Villa Township",
                "Petrol Bunk", "SIDCO Industrial Plot", "Engineering College", "Arts & Science College", "Sports Turf",
                "Badminton Academy", "Bank Zonal Office", "Central Kitchen", "Cloud Kitchen Hub", "Convention Center"
            ];

            const intelSources = [
                { n: "FB: Investor Groups", s: "site:facebook.com/groups" },
                { n: "LI: Corporate Leads", s: "site:linkedin.com" },
                { n: "SSC: NRI Infrastructure", s: "site:skyscrapercity.com" },
                { n: "Reddit: Madurai Intel", s: "site:reddit.com" },
                { n: "Quora: Investment", s: "site:quora.com" },
                { n: "Angel Investor Net", s: "site:investmentnetwork.in" },
                { n: "MagicBricks Wanted", s: "site:magicbricks.com" },
                { n: "99Acres Hot Buyers", s: "site:99acres.com" },
                { n: "OLX Direct Buyers", s: "site:olx.in" },
                { n: "Twitter: Real-time", s: "site:twitter.com" },
                { n: "Insta: Visual Intent", s: "site:instagram.com" },
                { n: "IndiaMart B2B", s: "site:indiamart.com" },
                { n: "NoBroker Plots", s: "site:nobroker.in" },
                { n: "CommonFloor", s: "site:commonfloor.com" },
                { n: "Sulekha Business", s: "site:sulekha.com" },
                { n: "Click.in Classifieds", s: "site:click.in" },
                { n: "Housing.com Leads", s: "site:housing.com" },
                { n: "MouthShut Reviews", s: "site:mouthshut.com" },
                { n: "Global Tamil NRI", s: 'intext:"Tamil NRI"' },
                { n: "Urgent Buyer Sniper", s: 'intext:"land wanted"' },
                { n: "PropTiger Leads", s: "site:proptiger.com" },
                { n: "SquareYards", s: "site:squareyards.com" },
                { n: "Locanto Classifieds", s: "site:locanto.net" },
                { n: "Gumtree Investors", s: "site:gumtree.com" },
                { n: "YouTube Real Estate", s: "site:youtube.com" },
                { n: "Telegram Lead Sync", s: "site:t.me" },
                { n: "Zameen Intel", s: "site:zameen.com" },
                { n: "Realtor Forum", s: "site:realtor.com" },
                { n: "Pinterest Property", s: "site:pinterest.com" },
                { n: "Deep Web Sniper", s: 'intext:"urgent buyer"' }
            ];

            return (
                <div>
                    <header style={{ padding: '20px 15px', background: '#111', textAlign: 'center', borderBottom: '1px solid #C8A84B' }}>
                        <div className="gold" style={{ fontWeight: 900, fontSize: '22px', letterSpacing: '2px' }}>BALEE GARDEN</div>
                        <div style={{ fontSize: '11px', color: '#888', marginTop: '4px', fontWeight: '700' }}>ALAGARKOVIL MADURAI PROJECT</div>
                    </header>

                    <div className="filter-bar">
                        <span className="filter-label">Target Freshness:</span>
                        <select className="time-select" value={timeFrame} onChange={(e)=>setTimeFrame(e.target.value)}>
                            <option value="d">Last 24 Hours</option>
                            <option value="w">Last 1 Week</option>
                            <option value="m">Last 1 Month</option>
                        </select>
                    </div>

                    <nav className="nav-scroll">
                        <button onClick={() => setTab("v22")} className={`nav-tab ${tab === 'v22' ? 'active' : ''}`}>Sectors (30)</button>
                        <button onClick={() => setTab("v24")} className={`nav-tab ${tab === 'v24' ? 'active' : ''}`}>Intelligence (30)</button>
                        <button onClick={() => setTab("extractor")} className={`nav-tab ${tab === 'extractor' ? 'active' : ''}`}>Extract</button>
                        <button onClick={() => setTab("assets")} className={`nav-tab ${tab === 'assets' ? 'active' : ''}`}>Assets</button>
                    </nav>

                    <main style={{ padding: '15px' }}>
                        {tab === 'v22' && (
                            <div>
                                <button className="btn-red" onClick={() => window.open('https://www.google.com/alerts')}> START LIVE MADURAI RADAR</button>
                                <div className="section-title">Industry Specific Leads</div>
                                <div style={{display:'grid', gridTemplateColumns:'1fr', gap:'2px'}}>
                                    {sectors.map((sec, i) => (
                                        <button key={i} className="btn-v22" onClick={() => openSearch(`"${sec}" Madurai`)}>
                                            {i+1}. {sec}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {tab === 'v24' && (
                            <div>
                                <div className="section-title">Social & Global Data Intelligence</div>
                                <div style={{display:'grid', gridTemplateColumns:'1fr', gap:'2px'}}>
                                    {intelSources.map((src, i) => (
                                        <button key={i} className="btn-v24" onClick={() => openSearch(`${src.s} "Madurai" land`)}>
                                            {i+1}. {src.n}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {tab === 'extractor' && (
                            <div className="card">
                                <div className="section-title">Lead Number Scraper</div>
                                <textarea rows="14" placeholder="Paste data here to scan for contacts..."></textarea>
                                <button className="btn-v24" style={{marginTop:'12px', textAlign:'center'}}> SCRAPE WHATSAPP NUMBERS</button>
                            </div>
                        )}

                        {tab === 'assets' && (
                            <div style={{textAlign:'center'}}>
                                <div className="section-title">Verified Marketing Materials</div>
                                <img src="flyer_local.png" className="asset-img" alt="Local Flyer" />
                                <img src="flyer_investor.png" className="asset-img" alt="Investor Flyer" />
                                <img src="flyer_nri.png" className="asset-img" alt="NRI Flyer" />
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
