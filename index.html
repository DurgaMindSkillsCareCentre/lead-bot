<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BALEE GARDEN - Omni Sniper v35.2</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; font-family: 'Inter', -apple-system, sans-serif; background: #050505; color: #f0ebe0; }
        .gold { color: #C8A84B; }
        .card { background: #111; border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid #C8A84B33; }
        .sniper-panel { background: #1a1408; padding: 15px; border-bottom: 2px solid #C8A84B; position: sticky; top: 0; z-index: 120; box-shadow: 0 4px 20px rgba(0,0,0,0.8); }
        .control-row { display: flex; flex-direction: column; gap: 8px; }
        .label { font-size: 9px; font-weight: 900; color: #C8A84B; text-transform: uppercase; letter-spacing: 1px; }
        select { background: #000; color: #C8A84B; border: 1px solid #C8A84B; padding: 10px; border-radius: 6px; font-size: 11px; font-weight: 700; outline: none; width: 100%; }
        .nav-scroll { display: flex; background: #050505; position: sticky; top: 135px; z-index: 100; border-bottom: 1px solid #333; overflow-x: auto; white-space: nowrap; }
        .nav-tab { flex: 1; padding: 15px 10px; border: none; background: transparent; color: #666; font-size: 9px; font-weight: 800; text-transform: uppercase; }
        .nav-tab.active { color: #C8A84B; border-bottom: 3px solid #C8A84B; background: #111; }
        .btn-v22 { background: #111; color: #C8A84B; border: 1px solid #C8A84B44; padding: 12px; font-size: 9px; border-radius: 4px; width: 100%; margin-bottom: 6px; text-align: left; font-weight: 600; text-transform: uppercase; }
        .btn-v24 { background: linear-gradient(135deg, #C8A84B, #8A6D29); color: #000; border: none; padding: 14px; font-weight: 800; border-radius: 6px; width: 100%; margin-bottom: 10px; text-transform: uppercase; font-size: 9px; text-align: left; }
        .section-title { font-size: 11px; font-weight: 800; margin: 15px 0 10px; color: #C8A84B; text-transform: uppercase; border-left: 3px solid #C8A84B; padding-left: 10px; }
        .asset-img { width: 100%; border-radius: 8px; margin-bottom: 15px; border: 1px solid #C8A84B33; }
        textarea { width: 100%; background: #000; color: #fff; border: 1px solid #333; padding: 12px; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [tab, setTab] = useState("v22");
            const [timeFrame, setTimeFrame] = useState("m");
            const [sniperMode, setSniperMode] = useState("direct");
            const [activeSector, setActiveSector] = useState("Multi Specialty Hospital");

            const sniperOptions = [
                { id: "direct", n: "1. Direct Buyers (Wanted/Required)", tag: "land wanted" },
                { id: "urgent", n: "2. Urgent Sniper (Immediate Cash)", tag: "urgent cash buyer" },
                { id: "nri", n: "3. NRI Investor Hub (Global Tamil)", tag: "NRI investment" },
                { id: "corp", n: "4. Corporate Acquisition (Expansion)", tag: "corporate expansion acquisition" },
                { id: "hosp", n: "8. Healthcare / Hospital Chain Site", tag: "hospital site wanted" },
                { id: "plot", n: "25. Gated Community Developers", tag: "promoter developer" }
            ];

            const sectors = ["Software Company", "IT Hub / Park", "Automobile Showroom", "Multi Specialty Hospital", "Nursing Home", "International School", "Logistics Godown", "Warehouse Park", "Gated Community", "Villa Township", "Petrol Bunk", "Sports Turf"];

            const intelSources = [
                { n: "LI: Corporate Leads", s: "site:linkedin.com" },
                { n: "FB: Investor Groups", s: "site:facebook.com" },
                { n: "Twitter: Real-time", s: "site:twitter.com" },
                { n: "Reddit: Madurai Intel", s: "site:reddit.com" },
                { n: "MagicBricks Wanted", s: "site:magicbricks.com" },
                { n: "99Acres Hot Buyers", s: "site:99acres.com" },
                { n: "OLX Direct Buyers", s: "site:olx.in" },
                { n: "YouTube Real Estate", s: "site:youtube.com" },
                { n: "Quora: Investment", s: "site:quora.com" },
                { n: "IndiaMart B2B", s: "site:indiamart.com" },
                { n: "NoBroker Plots", s: "site:nobroker.in" },
                { n: "CommonFloor", s: "site:commonfloor.com" },
                { n: "Sulekha Business", s: "site:sulekha.com" },
                { n: "Instagram Intent", s: "site:instagram.com" },
                { n: "Telegram Lead Sync", s: "site:t.me" }
            ];

            const openSearch = (sector, platform = "") => {
                const mode = sniperOptions.find(o => o.id === sniperMode);
                // The TRIPLE-LOCK logic: Platform + Sector + Sniper Tag
                const q = platform 
                    ? `${platform} Madurai "${sector}" ${mode.tag} -resale` 
                    : `"${sector}" Madurai "${mode.tag}"`;
                
                window.open(`https://www.google.com/search?q=${encodeURIComponent(q)}&tbs=qdr:${timeFrame}`, '_blank');
            };

            return (
                <div>
                    <div className="sniper-panel">
                        <header style={{ textAlign: 'center', marginBottom: '12px' }}>
                            <div className="gold" style={{ fontWeight: 900, fontSize: '20px' }}>BALEE GARDEN</div>
                            <div style={{ fontSize: '10px', color: '#888' }}>AI TRIPLE-LOCK v35.2</div>
                        </header>
                        <div className="control-row">
                            <span className="label">1. Lock Sniper Mode</span>
                            <select value={sniperMode} onChange={(e)=>setSniperMode(e.target.value)}>
                                {sniperOptions.map(opt => <option key={opt.id} value={opt.id}>{opt.n}</option>)}
                            </select>
                            <span className="label">2. Lock Time Window</span>
                            <select value={timeFrame} onChange={(e)=>setTimeFrame(e.target.value)}>
                                <option value="d">Last 24 Hours</option>
                                <option value="w">Last 1 Week</option>
                                <option value="m">Last 1 Month</option>
                            </select>
                        </div>
                    </div>

                    <nav className="nav-scroll">
                        <button onClick={() => setTab("v22")} className={`nav-tab ${tab === 'v22' ? 'active' : ''}`}>Sector Matrix</button>
                        <button onClick={() => setTab("v24")} className={`nav-tab ${tab === 'v24' ? 'active' : ''}`}>Platform Intel</button>
                        <button onClick={() => setTab("assets")} className={`nav-tab ${tab === 'assets' ? 'active' : ''}`}>Assets</button>
                        <button onClick={() => setTab("extractor")} className={`nav-tab ${tab === 'extractor' ? 'active' : ''}`}>Extract</button>
                    </nav>

                    <main style={{ padding: '15px' }}>
                        {tab === "v22" && (
                            <div>
                                <div className="section-title">Step 3: Industry Target (Select to Lock)</div>
                                {sectors.map((sec, i) => (
                                    <button key={i} className="btn-v22" style={{borderColor: activeSector === sec ? '#C8A84B' : ''}} 
                                        onClick={() => { setActiveSector(sec); openSearch(sec); }}>
                                        {i+1}. {sec} {activeSector === sec ? "✅" : ""}
                                    </button>
                                ))}
                            </div>
                        )}

                        {tab === "v24" && (
                            <div>
                                <div className="section-title">Step 4: Intel for {activeSector}</div>
                                {intelSources.map((src, i) => (
                                    <button key={i} className="btn-v24" onClick={() => openSearch(activeSector, src.s)}>
                                        {i+1}. {src.n}
                                    </button>
                                ))}
                            </div>
                        )}

                        {tab === "assets" && (
                            <div style={{textAlign:'center'}}>
                                <img src="flyer_local.png" className="asset-img" alt="Flyer 1" />
                                <img src="flyer_investor.png" className="asset-img" alt="Flyer 2" />
                            </div>
                        )}

                        {tab === "extractor" && (
                            <div className="card">
                                <textarea rows="10" placeholder="Paste lead text here..."></textarea>
                                <button className="btn-v24" style={{marginTop:'10px'}}>⚡ Scrape Contacts</button>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
