<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Madurai Master v30.0 - Ultimate Hub</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; font-family: 'Inter', -apple-system, sans-serif; background: #050505; color: #f0ebe0; }
        .gold { color: #C8A84B; }
        .card { background: #111; border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid #C8A84B33; }
        
        .nav-scroll { display: flex; background: #050505; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #C8A84B; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .nav-scroll::-webkit-scrollbar { display: none; }
        .nav-tab { flex: 0 0 auto; padding: 15px 22px; border: none; background: transparent; color: #666; font-size: 11px; font-weight: 800; text-transform: uppercase; white-space: nowrap; }
        .nav-tab.active { color: #C8A84B; background: #1a1408; border-bottom: 3px solid #C8A84B; }

        .btn-v22 { background: #1a1408; color: #C8A84B; border: 1px solid #C8A84B44; padding: 12px; font-size: 10px; border-radius: 6px; width: 100%; margin-bottom: 6px; text-align: left; font-weight: 600; text-transform: uppercase; }
        .btn-v24 { background: linear-gradient(135deg, #C8A84B, #8A6D29); color: #000; border: none; padding: 14px; font-weight: 800; border-radius: 8px; width: 100%; margin-bottom: 10px; text-transform: uppercase; font-size: 10px; text-align: left; }
        .btn-red { background: #d93025; color: #fff; border: none; padding: 16px; border-radius: 8px; width: 100%; font-weight: 900; margin-bottom: 15px; letter-spacing: 1px; }
        
        .section-title { font-size: 11px; font-weight: 800; margin: 15px 0 10px; color: #C8A84B; border-left: 3px solid #C8A84B; padding-left: 10px; text-transform: uppercase; }
        .asset-img { width: 100%; border-radius: 8px; border: 1px solid #C8A84B33; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        textarea { width: 100%; background: #000; color: #fff; border: 1px solid #333; padding: 12px; border-radius: 8px; box-sizing: border-box; font-family: monospace; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [tab, setTab] = useState("v22");
            const openSearch = (q) => window.open(`https://www.google.com/search?q=${encodeURIComponent(q)}&tbs=qdr:d`, '_blank');

            return (
                <div>
                    <header style={{ padding: '18px', background: '#111', textAlign: 'center', borderBottom: '1px solid #222' }}>
                        <div className="gold" style={{ fontWeight: 900, fontSize: '18px', letterSpacing: '1px' }}>MADURAI OMNI-HUB v30.0</div>
                        <div style={{ fontSize: '9px', color: '#888', marginTop: '4px' }}>ULTIMATE LEAD ACQUISITION SYSTEM</div>
                    </header>

                    <nav className="nav-scroll">
                        <button onClick={() => setTab("v22")} className={`nav-tab ${tab === 'v22' ? 'active' : ''}`}>Sector Targets (25+)</button>
                        <button onClick={() => setTab("v24")} className={`nav-tab ${tab === 'v24' ? 'active' : ''}`}>Global & Social (20+)</button>
                        <button onClick={() => setTab("extractor")} className={`nav-tab ${tab === 'extractor' ? 'active' : ''}`}>Extract</button>
                        <button onClick={() => setTab("assets")} className={`nav-tab ${tab === 'assets' ? 'active' : ''}`}>Assets</button>
                    </nav>

                    <main style={{ padding: '15px' }}>
                        {tab === 'v22' && (
                            <div>
                                <button className="btn-red" onClick={() => window.open('https://www.google.com/alerts')}>🚨 ACTIVATE 24/7 LIVE RADAR</button>
                                <div className="section-title">Industrial & Commercial Sectors</div>
                                <div className="card">
                                    <button className="btn-v22" onClick={() => openSearch('"software" OR "IT park" land Madurai')}>01. IT & Tech Parks</button>
                                    <button className="btn-v22" onClick={() => openSearch('"automobile showroom" Madurai highway')}>02. Car & Bike Showrooms</button>
                                    <button className="btn-v22" onClick={() => openSearch('"specialty hospital" OR "medical" Madurai')}>03. Multi-Specialty Hospitals</button>
                                    <button className="btn-v22" onClick={() => openSearch('"warehouse" OR "logistics park" Madurai')}>04. Warehousing & Logistics</button>
                                    <button className="btn-v22" onClick={() => openSearch('"international school" OR "CBSE" Madurai')}>05. Educational Institutions</button>
                                    <button className="btn-v22" onClick={() => openSearch('"mini function hall" OR "marriage hall" Madurai')}>06. Convention & Mini Halls</button>
                                    <button className="btn-v22" onClick={() => openSearch('"textile" OR "garment" factory Madurai')}>07. Textiles & Manufacturing</button>
                                    <button className="btn-v22" onClick={() => openSearch('"resort" OR "eco tourism" Madurai')}>08. Resorts & Tourism</button>
                                    <button className="btn-v22" onClick={() => openSearch('"cold storage" OR "food park" Madurai')}>09. Cold Storage & Agri-Processing</button>
                                    <button className="btn-v22" onClick={() => openSearch('"gated community" OR "villa project" Madurai')}>10. Luxury Gated Communities</button>
                                    <button className="btn-v22" onClick={() => openSearch('"petrol bunk" OR "EV charging" Madurai highway')}>11. Fuel & EV Stations</button>
                                    <button className="btn-v22" onClick={() => openSearch('"retirement home" OR "senior living" Madurai')}>12. Senior Living Projects</button>
                                    <button className="btn-v22" onClick={() => openSearch('"sports turf" OR "academy" Madurai')}>13. Sports & Recreation</button>
                                    <button className="btn-v22" onClick={() => openSearch('"bank zonal office" Madurai')}>14. Corporate Bank Branches</button>
                                    <button className="btn-v22" onClick={() => openSearch('"industrial estate" OR "SIDCO" Madurai')}>15. Industrial Plot Demands</button>
                                    <button className="btn-v22" onClick={() => openSearch('"central kitchen" OR "cloud kitchen" Madurai')}>16. F&B / Cloud Kitchens</button>
                                    <button className="btn-v22" onClick={() => openSearch('"temple trust" OR "ashram" land Madurai')}>17. Institutional / Trust Land</button>
                                    <button className="btn-v22" onClick={() => openSearch('"multiplex" OR "mall" Madurai')}>18. Commercial Malls / Cinema</button>
                                    <button className="btn-v22" onClick={() => openSearch('"supermarket" OR "department store" Madurai')}>19. Large Format Retail</button>
                                    <button className="btn-v22" onClick={() => openSearch('"farm house" OR "organic garden" Madurai')}>20. Weekend Farm Projects</button>
                                    <button className="btn-v22" onClick={() => openSearch('"hotel" OR "budget stay" Madurai highway')}>21. Highway Transit Hotels</button>
                                    <button className="btn-v22" onClick={() => openSearch('"co-working space" Madurai')}>22. Managed Offices / Hubs</button>
                                </div>
                            </div>
                        )}

                        {tab === 'v24' && (
                            <div>
                                <div className="section-title">Global NRI & Digital Intelligence</div>
                                <div className="card">
                                    <button className="btn-v24" onClick={() => openSearch('site:facebook.com/groups "Madurai" land wanted')}>01. FB: INVESTOR GROUPS</button>
                                    <button className="btn-v24" onClick={() => openSearch('site:linkedin.com "land requirement" Madurai')}>02. LI: CORPORATE ACQUISITION</button>
                                    <button className="btn-v24" onClick={() => openSearch('site:skyscrapercity.com "Madurai" projects')}>03. NRI: SKYSCRAPER CITY</button>
                                    <button className="btn-v24" onClick={() => openSearch('site:reddit.com "Madurai" investment')}>04. REDDIT: LOCAL INTEL</button>
                                    <button className="btn-v24" onClick={() => openSearch('site:quora.com "buy land in Madurai"')}>05. QUORA: EXPERT ADVICE</button>
                                    <button className="btn-v24" onClick={() => openSearch('site:investmentnetwork.in "Madurai"')}>06. ANGEL INVESTOR PORTAL</button>
                                    <button className="btn-v24" onClick={() => openSearch('site:magicbricks.com "wanted" Madurai')}>07. MAGICBRICKS: RE-LEADS</button>
                                    <button className="btn-v24" onClick={() => openSearch('site:99acres.com "wanted" Madurai')}>08. 99ACRES: HOT BUYERS</button>
                                    <button className="btn-v24" onClick={() => openSearch('site:olx.in "buying plots" Madurai')}>09. OLX: DIRECT BUYERS</button>
                                    <button className="btn-v24" onClick={() => openSearch('site:twitter.com "buying land" Madurai')}>10. TWITTER/X: REAL-TIME</button>
                                    <button className="btn-v24" onClick={() => openSearch('site:instagram.com "property wanted" Madurai')}>11. INSTA: VISUAL INTENT</button>
                                    <button className="btn-v24" onClick={() => openSearch('site:indiamart.com "land for sale" Madurai')}>12. INDIAMART: B2B NEEDS</button>
                                    <button className="btn-v24" onClick={() => openSearch('site:nobroker.in "plots" Madurai')}>13. NOBROKER: BUYER RADAR</button>
                                    <button className="btn-v24" onClick={() => openSearch('site:commonfloor.com "Madurai"')}>14. COMMONFLOOR: RESIDENTIAL</button>
                                    <button className="btn-v24" onClick={() => openSearch('site:sulekha.com "real estate" Madurai')}>15. SULEKHA: LOCAL SERVICE</button>
                                    <button className="btn-v24" onClick={() => openSearch('site:click.in "wanted land" Madurai')}>16. CLICK.IN: CLASSIFIEDS</button>
                                    <button className="btn-v24" onClick={() => openSearch('site:housing.com "requirement" Madurai')}>17. HOUSING.COM: ACTIVE LEADS</button>
                                    <button className="btn-v24" onClick={() => openSearch('site:mouthshut.com "builders" Madurai')}>18. MOUTHSHUT: REPUTATION</button>
                                    <button className="btn-v24" onClick={() => openSearch('intext:"investing in Madurai" NRI forums')}>19. GLOBAL TAMIL FORUMS</button>
                                    <button className="btn-v24" onClick={() => openSearch('intext:"urgent land wanted" Madurai')}>20. DEEP WEB SNIPER</button>
                                </div>
                            </div>
                        )}

                        {tab === 'extractor' && (
                            <div className="card">
                                <div className="section-title">Lead Scraper</div>
                                <textarea rows="12" placeholder="Paste social media comments or lists here..."></textarea>
                                <button className="btn-v24" style={{marginTop:'12px', textAlign:'center'}}>⚡ EXTRACT WHATSAPP NUMBERS</button>
                            </div>
                        )}

                        {tab === 'assets' && (
                            <div style={{textAlign:'center'}}>
                                <div className="section-title">Project Flyers (3)</div>
                                <img src="1.jpg" className="asset-img" onError={(e)=>e.target.src='https://via.placeholder.com/400x500/111/C8A84B?text=Flyer+1'} />
                                <img src="2.jpg" className="asset-img" onError={(e)=>e.target.src='https://via.placeholder.com/400x500/111/C8A84B?text=Flyer+2'} />
                                <img src="3.jpg" className="asset-img" onError={(e)=>e.target.src='https://via.placeholder.com/400x500/111/C8A84B?text=Flyer+3'} />
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
