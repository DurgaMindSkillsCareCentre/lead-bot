<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Lead Bot Ultimate AI</title>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { margin:0; font-family: Arial; background:#0b0b0b; color:white; }

    button {
      width:100%;
      padding:10px;
      margin:5px 0;
      border:none;
      border-radius:8px;
      background:#1f1f1f;
      color:white;
    }

    textarea {
      width:100%;
      padding:8px;
      margin:8px 0;
      border-radius:6px;
      border:none;
    }

    .card {
      padding:12px;
      margin:10px;
      border-radius:12px;
    }

    .hot { background:#3a0000; }
    .warm { background:#3a2a00; }
    .cold { background:#1a1a1a; }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
