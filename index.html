<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BALEE GARDEN - Money Matrix v37.0</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; background: #050505; color: #f0ebe0; }
        .gold { color: #C8A84B; }
        .card { background: #111; border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid #C8A84B33; }
        
        /* THE GLOBAL DROPBOX PANEL */
        .global-panel { background: #1a1408; padding: 15px; border-bottom: 2px solid #C8A84B; position: sticky; top: 0; z-index: 120; box-shadow: 0 4px 25px rgba(0,0,0,1); }
        .control-row { display: flex; flex-direction: column; gap: 10px; }
        .label { font-size: 10px; font-weight: 900; color: #C8A84B; text-transform: uppercase; letter-spacing: 1px; }
        select { background: #000; color: #C8A84B; border: 1px solid #C8A84B; padding: 12px; border-radius: 8px; font-size: 12px; font-weight: 700; outline: none; width: 100%; appearance: none; }

        .nav-scroll { display: flex; background: #050505; position: sticky; top: 155px; z-index: 100; border-bottom: 1px solid #333; overflow-x: auto; scrollbar-width: none; }
        .nav-tab { flex: 0 0 auto; padding: 15px 20px; border: none; background: transparent; color: #666; font-size: 10px; font-weight: 800; text-transform: uppercase; white-space: nowrap; }
        .nav-tab.active { color: #C8A84B; border-bottom: 3px solid #C8A84B; background: #111; }

        .btn-v22 { background: #111; color: #C8A84B; border: 1px solid #C8A84B44; padding: 14px; font-size: 10px; border-radius: 6px; width: 100%; margin-bottom: 6px; text-align: left; font-weight: 600; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; }
        .btn-v22:after { content: '→'; opacity: 0.5; }
        .btn-red { background: #d93025; color: #fff; border: none; padding: 18px; border-radius: 8px; width: 100%; font-weight: 900; margin-bottom: 15px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 4px 15px rgba(217,48,37,0.4); }
        
        .section-title { font-size: 11px; font-weight: 800; margin: 15px 0 10px; color: #C8A84B; text-transform: uppercase; border-left: 4px solid #C8A84B; padding-left: 10px; }
        .asset-img { width: 100%; border-radius: 8px; margin-bottom: 15px; border: 1px solid #C8A84B33; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [tab, setTab] = useState("v22");
            const [timeFrame, setTimeFrame] = useState("d");
            const [moneySource, setMoneySource] = useState("tax");

            // GLOBAL MONEY INTENT OPTIONS
            const moneyOptions = [
                { id: "tax", n: "💰 TAX SAVER: Capital Gains / 54EC Re-investment" },
                { id: "corp", n: "🏢 CORP BUDGET: Branch Expansion / New Market" },
                { id: "pilgrim", n: "🕉️ PILGRIM MONEY: Temple Tourism / Retreats" },
                { id: "hni", n: "💎 HNI WEALTH: Private Wealth / Land Banking" },
                { id: "inst", n: "🎓 INSTI FUNDS: Trust / NGO / CSR Projects" },
                { id: "nri", n: "🌍 GLOBAL TAMIL: NRI / Expat Repatriation" }
            ];

            const getQuery = (base) => {
                const map = {
                    tax: `"${base}" Madurai "land for tax saving" OR "reinvestment"`,
                    corp: `"${base}" Madurai "expansion budget" OR "new branch"`,
                    pilgrim: `"${base}" Alagarkovil "spiritual retreat" OR "ashram land"`,
                    hni: `"${base}" Madurai "private family office" OR "land bank"`,
                    inst: `"${base}" Madurai "educational trust land" OR "NGO project"`,
                    nri: `"${base}" Madurai "NRI investment" OR "buying land"`
                };
                return map[moneySource] || `"${base}" Madurai land`;
            };

            const openSearch = (q) => {
                window.open(`https://www.google.com/search?q=${encodeURIComponent(getQuery(q))}&tbs=qdr:${timeFrame}`, '_blank');
            };

            const sectors = [
                "Software Park", "IT Campus", "Auto Showroom", "Solar Farm", "Multi Specialty Hospital",
                "Film City Studio", "International School", "Arts College", "Logistics Hub", "Warehouse",
                "Marriage Mahal", "Convention Center", "Textile Unit", "Garment Factory", "Eco Resort",
                "Agro Farm House", "Yoga Retreat", "Food Processing", "Gated Community", "Villa Project",
                "Petrol Bunk", "Manufacturing Unit", "Engineering College", "Medical College", "Sports Turf",
                "Spiritual Center", "Bank Zonal Office", "Central Kitchen", "Cloud Kitchen", "Retirement Villa"
            ];

            return (
                <div>
                    <div className="global-panel">
                        <header style={{ textAlign: 'center', marginBottom: '15px' }}>
                            <div className="gold" style={{ fontWeight: 900, fontSize: '20px', letterSpacing: '2px' }}>BALEE GARDEN</div>
                            <div style={{ fontSize: '10px', color: '#888', fontWeight: '800' }}>MONEY-SOURCE LEAD MATRIX</div>
                        </header>
                        <div className="control-row">
                            <div>
                                <span className="label">1. Follow The Money (Global Intent)</span>
                                <select value={moneySource} onChange={(e)=>setMoneySource(e.target.value)}>
                                    {moneyOptions.map(opt => <option key={opt.id} value={opt.id}>{opt.n}</option>)}
                                </select>
                            </div>
                            <div>
                                <span className="label">2. Target Freshness</span>
                                <select value={timeFrame} onChange={(e)=>setTimeFrame(e.target.value)}>
                                    <option value="d">Last 24 Hours (Immediate Buyers)</option>
                                    <option value="w">Last 1 Week (Active Pipeline)</option>
                                    <option value="m">Last 1 Month (Market Research)</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <nav className="nav-scroll">
                        <button onClick={() => setTab("v22")} className={`nav-tab ${tab === 'v22' ? 'active' : ''}`}>Sector Matrix (30)</button>
                        <button onClick={() => setTab("extractor")} className={`nav-tab ${tab === 'extractor' ? 'active' : ''}`}>Extract Numbers</button>
                        <button onClick={() => setTab("assets")} className={`nav-tab ${tab === 'assets' ? 'active' : ''}`}>Flyers</button>
                    </nav>

                    <main style={{ padding: '15px' }}>
                        {tab === 'v22' && (
                            <div>
                                <button className="btn-red" onClick={() => window.open('https://www.google.com/alerts')}>🚨 ACTIVATE LIVE LEAD ALERTS</button>
                                <div className="section-title">Industry Targets • Searching for {moneySource.toUpperCase()}</div>
                                <div style={{display:'grid', gridTemplateColumns:'1fr', gap:'2px'}}>
                                    {sectors.map((sec, i) => (
                                        <button key={i} className="btn-v22" onClick={() => openSearch(sec)}>
                                            {i+1}. {sec}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {tab === 'extractor' && (
                            <div className="card">
                                <textarea rows="14" placeholder="Paste social media comments or buyer lists here..."></textarea>
                                <button className="btn-red" style={{marginTop:'12px', background:'#C8A84B', color:'#000'}}>⚡ SCRAPE CONTACTS</button>
                            </div>
                        )}

                        {tab === 'assets' && (
                            <div style={{textAlign:'center'}}>
                                <img src="flyer_local.png" className="asset-img" alt="Local" />
                                <img src="flyer_investor.png" className="asset-img" alt="Investor" />
                                <img src="flyer_nri.png" className="asset-img" alt="NRI" />
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
