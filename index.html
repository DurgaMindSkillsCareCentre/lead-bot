<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Madurai Master v26.0 - 4 Tab Mega Center</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; font-family: 'Inter', -apple-system, sans-serif; background: #050505; color: #f0ebe0; }
        .gold { color: #C8A84B; }
        .card { background: #111; border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid #C8A84B33; }
        .btn-gold { background: linear-gradient(135deg, #C8A84B, #A07030); color: #000; border: none; border-radius: 8px; padding: 14px; font-weight: 800; font-size: 11px; cursor: pointer; width: 100%; text-transform: uppercase; letter-spacing: 1px; margin-top: 8px; }
        .btn-v23 { background: #1a1408; color: #C8A84B; border: 1px solid #C8A84B; padding: 12px; font-size: 10px; border-radius: 6px; width: 100%; margin-bottom: 8px; text-align: left; }
        .btn-v24 { background: linear-gradient(to right, #1a1408, #222); color: #C8A84B; border-left: 5px solid #C8A84B; padding: 15px; font-weight: 800; border-radius: 4px; width: 100%; margin-bottom: 10px; border-top: 0; border-right: 0; border-bottom: 0; text-align: left; }
        .nav-bar { display: flex; background: #050505; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #C8A84B33; overflow-x: auto; }
        .nav-tab { flex: 0 0 auto; padding: 15px 20px; border: none; background: transparent; color: #666; font-size: 10px; font-weight: 700; text-transform: uppercase; white-space: nowrap; }
        .nav-tab.active { color: #C8A84B; border-bottom: 3px solid #C8A84B; background: #1a1408; }
        .section-title { font-size: 11px; font-weight: 800; margin: 15px 0 10px; color: #C8A84B; text-transform: uppercase; letter-spacing: 1px; }
        .asset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .asset-card { background: #111; border: 1px solid #C8A84B33; border-radius: 8px; overflow: hidden; }
        .asset-img { width: 100%; height: 150px; object-fit: cover; display: block; background: #222; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [tab, setTab] = useState("v23");

            const openSearch = (q) => {
                window.open(`https://www.google.com/search?q=${encodeURIComponent(q)}&tbs=qdr:d`, '_blank');
            };

            const assetImages = ["1.jpg", "2.jpg", "3.jpg", "4.jpg", "5.jpg", "6.jpg", "7.jpg", "8.jpg"];

            return (
                <div>
                    <header style={{ padding: '15px', background: '#111', borderBottom: '2px solid #C8A84B', textAlign: 'center' }}>
                        <div className="gold" style={{ fontWeight: 900, fontSize: '16px' }}>ALAGARKOVIL MADURAI PROJECT</div>
                        <div style={{ fontSize: '9px', color: '#888' }}>MASTER v26.0 • 4-TAB MEGA CENTER</div>
                    </header>

                    <nav className="nav-bar">
                        <button onClick={() => setTab("v23")} className={`nav-tab ${tab === 'v23' ? 'active' : ''}`}>Menu v23</button>
                        <button onClick={() => setTab("v24")} className={`nav-tab ${tab === 'v24' ? 'active' : ''}`}>Menu v24</button>
                        <button onClick={() => setTab("extractor")} className={`nav-tab ${tab === 'extractor' ? 'active' : ''}`}>Extract</button>
                        <button onClick={() => setTab("assets")} className={`nav-tab ${tab === 'assets' ? 'active' : ''}`}>Assets</button>
                    </nav>

                    <main style={{ padding: '15px' }}>
                        {tab === 'v23' && (
                            <div>
                                <div className="section-title">v23 Single Buttons (Sector Focus)</div>
                                <div className="card">
                                    <button className="btn-v23" onClick={() => openSearch('"software company" land Madurai')}>SOFTWARE & TECH HUB</button>
                                    <button className="btn-v23" onClick={() => openSearch('"mini function hall" Madurai')}>MINI FUNCTION HALLS</button>
                                    <button className="btn-v23" onClick={() => openSearch('"automobile showroom" Madurai highway')}>CAR SHOWROOMS</button>
                                    <button className="btn-v23" onClick={() => openSearch('"specialty hospital" Madurai')}>SPECIALTY HOSPITALS</button>
                                    <button className="btn-v23" onClick={() => openSearch('"international school" Madurai')}>EDUCATION INSTITUTES</button>
                                    <button className="btn-v23" onClick={() => openSearch('"warehouse" Madurai highway')}>LOGISTICS & WAREHOUSE</button>
                                </div>
                            </div>
                        )}

                        {tab === 'v24' && (
                            <div>
                                <div className="section-title">v24 Premium Sniper (Social & NRI)</div>
                                <div className="card">
                                    <button className="btn-v24" onClick={() => openSearch('site:skyscrapercity.com "Madurai" investment')}>NRI: INFRASTRUCTURE HUB</button>
                                    <button className="btn-v24" onClick={() => openSearch('site:facebook.com/groups "NRI Madurai" land')}>NRI: GLOBAL FORUMS</button>
                                    <button className="btn-v24" onClick={() => openSearch('site:linkedin.com "wanted land" Madurai')}>LINKEDIN: BRAND MANAGERS</button>
                                    <button className="btn-v24" onClick={() => openSearch('site:twitter.com "land requirement" Madurai')}>TWITTER (X) SNIPER</button>
                                    <button className="btn-v24" onClick={() => openSearch('site:instagram.com "real estate" Madurai')}>INSTAGRAM SNIPER</button>
                                    <button className="btn-v24" onClick={() => openSearch('site:investmentnetwork.in "Madurai"')}>PURE INVESTOR NETWORK</button>
                                </div>
                            </div>
                        )}

                        {tab === 'extractor' && (
                            <div className="card">
                                <div className="section-title">WhatsApp Number Extractor</div>
                                <textarea style={{width:'100%', background:'#000', color:'#fff', border:'1px solid #333', padding:'10px', borderRadius:'8px'}} rows="10" placeholder="Paste social media leads here..."></textarea>
                                <button className="btn-gold">Extract & Connect</button>
                            </div>
                        )}

                        {tab === 'assets' && (
                            <div>
                                <div className="section-title">Marketing Gallery (Click to Open)</div>
                                <div className="asset-grid">
                                    {assetImages.map((img, i) => (
                                        <div key={i} className="asset-card" onClick={() => window.open(img, '_blank')}>
                                            <img 
                                                src={img} 
                                                className="asset-img" 
                                                alt={`Asset ${i+1}`}
                                                onError={(e) => { e.target.src='https://via.placeholder.com/300x400/111/C8A84B?text=Tap+to+View+Asset+'+(i+1); }}
                                            />
                                            <div style={{fontSize:'10px', textAlign:'center', padding:'8px', color:'#C8A84B'}}>OPEN ASSET {i+1}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
