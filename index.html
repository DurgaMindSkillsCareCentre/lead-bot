<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sniper Bot v3 - Prof. Suresh Kumar</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #050505; color: #f0ebe0; }
        .gold { color: #C8A84B; }
        .card { background: #111; border-radius: 12px; padding: 15px; margin-bottom: 10px; border: 1px solid #C8A84B33; position: relative; }
        .btn-gold { background: linear-gradient(135deg, #C8A84B, #A07030); color: #000; border: none; border-radius: 8px; padding: 12px; font-weight: 800; font-size: 11px; cursor: pointer; width: 100%; text-transform: uppercase; letter-spacing: 1px; }
        .btn-outline { background: transparent; border: 1px solid #C8A84B; color: #C8A84B; border-radius: 8px; padding: 10px; font-size: 10px; width: 100%; margin-top: 5px; }
        .nav-tab { flex: 1; padding: 15px 5px; border: none; background: transparent; color: #666; font-size: 10px; font-weight: 700; border-bottom: 2px solid transparent; }
        .nav-tab.active { color: #C8A84B; border-bottom: 2px solid #C8A84B; background: #1a1408; }
        .live-tag { position: absolute; top: 10px; right: 10px; background: #ff4444; color: white; padding: 2px 6px; border-radius: 4px; font-size: 8px; font-weight: 900; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        textarea, input { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; color: white; margin-bottom: 10px; box-sizing: border-box; font-size: 13px; }
        .step { font-size: 11px; color: #888; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [tab, setTab] = useState("realtime");
            const [rawText, setRawText] = useState("");
            const [extractedPhone, setExtractedPhone] = useState("");

            const sniperSearch = (query, timeRange = "") => {
                const timeParam = timeRange ? `&tbs=qdr:${timeRange}` : "";
                window.open(`https://www.google.com/search?q=${encodeURIComponent(query)}${timeParam}`, '_blank');
            };

            const extractPhone = () => {
                const match = rawText.match(/(?:\+91|91|0)?[6-9]\d{9}/g);
                if (match) {
                    setExtractedPhone(match[0]);
                    alert(" Number Found: " + match[0]);
                } else {
                    alert(" No number found in text.");
                }
            };

            const openWA = () => {
                let num = extractedPhone.replace(/\D/g, '');
                if(num.length === 10) num = '91' + num;
                const msg = encodeURIComponent("Hi, I saw your land requirement. I am Prof. Suresh Kumar, owner of 23.5-cent plot at Alagarkovil Highway Junction, Madurai. 46ft frontage. Are you interested?");
                window.open(`https://wa.me/${num}?text=${msg}`, '_blank');
            };

            return (
                <div style={{ display: 'flex', flexDirection: 'column', height: '100vh' }}>
                    <header style={{ padding: '20px', background: '#111', borderBottom: '1px solid #C8A84B' }}>
                        <div className="gold" style={{ fontWeight: 900, fontSize: '18px' }}>ULTIMATE SNIPER v3</div>
                        <div style={{ fontSize: '10px', color: '#888' }}>REAL-TIME MONITORING & EXTRACTION</div>
                    </header>

                    <div style={{ display: 'flex', background: '#050505' }}>
                        <button onClick={() => setTab("realtime")} className={`nav-tab ${tab === 'realtime' ? 'active' : ''}`}> LIVE SNIPER</button>
                        <button onClick={() => setTab("alerts")} className={`nav-tab ${tab === 'alerts' ? 'active' : ''}`}> AUTO-ALERTS</button>
                        <button onClick={() => setTab("extract")} className={`nav-tab ${tab === 'extract' ? 'active' : ''}`}> EXTRACTOR</button>
                    </div>

                    <main style={{ flex: 1, overflowY: 'auto', padding: '15px' }}>
                        {tab === 'realtime' && (
                            <div>
                                <div className="card">
                                    <div className="live-tag">REAL-TIME</div>
                                    <span className="gold" style={{fontSize:'12px', fontWeight:'bold'}}>LAST 24 HOURS ONLY</span>
                                    <p style={{fontSize: '11px', color: '#888'}}>Avoids old listings. Only shows people who posted today.</p>
                                    <button className="btn-gold" onClick={() => sniperSearch('site:facebook.com "wanted" "land" "Madurai" "+91"', 'd')}>
                                        New FB Buyers (24h)
                                    </button>
                                    <button className="btn-outline" onClick={() => sniperSearch('site:linkedin.com "investor" "Tamil Nadu" "Real Estate"', 'd')}>
                                        LinkedIn Investors (24h)
                                    </button>
                                </div>
                                <div className="card">
                                    <span className="gold" style={{fontSize:'12px', fontWeight:'bold'}}>SPECIFIC USE CASES</span>
                                    <button className="btn-gold" style={{marginTop:'10px'}} onClick={() => sniperSearch('"petrol bunk" "wanted" "land" "Tamil Nadu"', 'w')}>
                                        Petrol Bunk Leads (Weekly)
                                    </button>
                                    <button className="btn-outline" onClick={() => sniperSearch('"highway land" "Madurai" "wanted"', 'd')}>
                                        Highway Junction Leads
                                    </button>
                                </div>
                            </div>
                        )}

                        {tab === 'alerts' && (
                            <div>
                                <div className="card">
                                    <span className="gold" style={{fontSize:'12px', fontWeight:'bold'}}>SET UP GOOGLE ALERTS</span>
                                    <p style={{fontSize: '11px', color: '#bbb'}}>Follow these steps to get leads in your EMAIL automatically.</p>
                                    <div className="step">1. Click "Open Google Alerts"</div>
                                    <div className="step">2. Copy & Paste the Query below</div>
                                    <div className="step">3. Set frequency to "As it happens"</div>
                                    <button className="btn-gold" onClick={() => window.open('https://www.google.com/alerts', '_blank')}>1. OPEN GOOGLE ALERTS</button>
                                    <div style={{marginTop:'15px'}}>
                                        <span className="gold" style={{fontSize:'10px'}}>BEST QUERY:</span>
                                        <input readOnly value={'site:facebook.com "Madurai" "wanted" "land"'} />
                                        <button className="btn-outline" onClick={() => {navigator.clipboard.writeText('site:facebook.com "Madurai" "wanted" "land"'); alert('Copied!')}}> COPY QUERY</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {tab === 'extract' && (
                            <div>
                                <div className="card">
                                    <span className="gold" style={{fontSize:'12px', fontWeight:'bold'}}>WHATSAPP NUMBER SCANNER</span>
                                    <p style={{fontSize: '11px', color: '#bbb'}}>Paste any comment or long post text here. I will find the number.</p>
                                    <textarea 
                                        rows="5" 
                                        placeholder="Paste lead text here..." 
                                        value={rawText} 
                                        onChange={(e)=>setRawText(e.target.value)}
                                    />
                                    <button className="btn-gold" onClick={extractPhone}>FIND NUMBER</button>
                                    {extractedPhone && (
                                        <div style={{marginTop:'15px'}}>
                                            <div style={{fontSize:'14px', color:'#25D366', fontWeight:'bold', textAlign:'center'}}>{extractedPhone}</div>
                                            <button className="btn-gold" style={{background:'#25D366', color:'white', marginTop:'10px'}} onClick={openWA}>
                                                 WHATSAPP NOW
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
